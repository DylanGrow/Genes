<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Family genealogy tree">
  <meta name="theme-color" content="#1a472a">
  <title>Family Tree</title>
  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🌳</text></svg>">
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiRmFtaWx5IFRyZWUiLCJzaG9ydF9uYW1lIjoiRmFtaWx5Iiwic3RhcnRfdXJsIjoiLi9pbmRleC5odG1sIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI2ZmZiIsInRoZW1lX2NvbG9yIjoiIzFhNDcyYSJ9">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="site-header">
    <h1>Family Tree</h1>
    <nav aria-label="Primary">
      <button id="menu-toggle" aria-expanded="false" aria-controls="nav-list" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul id="nav-list" class="nav-list">
        <li><a href="#tree" aria-current="page">Tree</a></li>
        <li><a href="#people">People</a></li>
        <li><a href="#timeline">Timeline</a></li>
        <li><a href="#data">Data</a></li>
        <li><a href="#about">About</a></li>
      </ul>
    </nav>
    <div role="search" class="site-search">
      <label for="search-input" class="visually-hidden">Search people</label>
      <input type="search" id="search-input" placeholder="Find a person..." autocomplete="off">
      <ul id="search-results" class="search-results" role="listbox" hidden></ul>
    </div>
  </header>

  <main id="main">
    <section id="tree" class="tree-section" aria-labelledby="tree-heading">
      <h2 id="tree-heading" class="visually-hidden">Family Tree</h2>

      <div class="view-controls">
        <button class="view-btn active" data-view="pedigree" aria-pressed="true">Pedigree</button>
        <button class="view-btn" data-view="descendants" aria-pressed="false">Descendants</button>
      </div>

      <div class="tree-container" id="tree-root">
        <!-- Tree renders here -->
      </div>
    </section>

    <section id="people" class="people-section" hidden>
      <h2>People</h2>
      <div class="section-actions">
        <button class="btn-primary" id="add-person-btn">
          <span>➕</span> Add Person
        </button>
        <button class="btn-secondary" id="add-family-btn">
          <span>💑</span> Add Family/Marriage
        </button>
      </div>
      <ul class="people-list" id="people-list"></ul>
    </section>

    <section id="timeline" class="timeline-section" hidden>
      <div id="timeline-container"></div>
    </section>

    <section id="data" class="data-section" hidden>
      <h2>Manage Data</h2>
      <div class="data-actions">
        <button class="btn-primary" id="quick-add-btn">
          <span>⚡</span> Quick Add Family Members
        </button>
        <button class="btn-secondary" id="manage-relationships-btn">
          <span>🔗</span> Manage Relationships
        </button>
        <button class="btn-secondary" id="import-data-btn">
          <span>📥</span> Import Data
        </button>
        <button class="btn-secondary" id="export-data-btn">
          <span>📤</span> Export Data
        </button>
      </div>
    </section>

    <section id="about" class="about-section" hidden>
      <h2>About</h2>
      <p>Private family genealogy. No data leaves your device.</p>
    </section>
  </main>

  <dialog id="person-modal" class="person-modal" aria-labelledby="modal-name">
    <button class="modal-close" aria-label="Close">&times;</button>
    <article>
      <header>
        <h3 id="modal-name"></h3>
        <p id="modal-dates" class="life-dates"></p>
      </header>
      <dl class="person-details">
        <div><dt>Birth</dt><dd id="modal-birth"></dd></div>
        <div><dt>Death</dt><dd id="modal-death"></dd></div>
        <div><dt>Spouse</dt><dd id="modal-spouse"></dd></div>
        <div><dt>Children</dt><dd id="modal-children"></dd></div>
      </dl>
    </article>
  </dialog>

  <script src="js/firebase-config.js"></script>
  <script src="js/photo-storage.js"></script>
  <script src="js/photo-ui.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/timeline-ui.js"></script>
  <script src="js/data-manager.js"></script>
  <script src="js/smart-features.js"></script>
  <script src="js/importer.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
